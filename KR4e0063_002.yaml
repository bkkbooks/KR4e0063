body:
  text: 海叟集卷二明袁凱撰五言古詩新治圃成隙壤所自治剪荆去蘢茸幸無棼穢雜況此清泉涌灌滋竟朝夕勾萌各森聳青蒲已彌澤黃瓜方卧隴春菁尚堪把秋梨日應重自余通宦籍職事勞紛冗祿食雖云美私心恆自恐歸來得蕭茆采擷聊自奉且遂丘園樂永謝承明寵適揚州適一作過淮海表兹郡東南誠要津近代亦雄藩親王涖斯民荆吳自兹入燕趙亦來臻舟車無停運孳貨若丘墳冠蓋充廛里歌吹咽城闉美酒既如澠粱肉夾道陳休養近百年富庶難具論大道無恆處榮悴每相因風煙一披拂奄忽同埃塵空屋嘯蹲鴟崩垣走驚麏萑蒲交四野胔骼儼若薪貴賤不復知賢愚安能分豫有山陽遣經過屬秋辰憑髙肆遐覽落日無行人欲繼蕪城作薄劣愧參軍自揚子舍舟步入常熟縣水行已兼旬舟楫若馳逐晨昏侣鮫鱷出入同雁鶩黑風無終竟白浪仍反覆鏗鍧絶天樞漰湃折地軸旋淵屢傾墜利石時抵觸淪喪固非逺哀籲寧辭黷皇天實隂隲兹辰遂平陸神魂息漂蕩手足散頑木徒侣紛慶來酒胾及奴僕況茲春風和百草回新緑山桃亦多花逶迤自相屬枌榆已在邇曠隔無再宿從兹謝奔走且飯東臯粟書北山精舍壁夙昔慕幽曠中年值奔走及兹始知返顧已成皓首兹為山水選風氣固深厚崒嵂皆巘崿綿邈盡林藪清泉瀉幽磴白雲被層阜既多緇素流況有耕釣叟初心已云協雅言得兼受始來踈梅墮復此山櫻剖庶幾去日遲誰謂行當久揮手謝朋侣吾將寄衰朽送吳本立歸吳門九月氣已肅蟋蟀入牀下􅗳􅗳南來雁寂歷江上雨傷哉逺歸人斯時不遑處豈惟懷鄉里塋域久蓁莽樵蘇無可禁奠謁曠時序長年抱憂感悒鬱相一作將誰語兹行遂初志況復念勤苦勾吳不可見迢迢望煙渚久旱雨後行園旱雲不可沮丘園生意窮旨蓄已無遺何以御吾冬昊天無終極玄化沛神功密雲興四郊飛雨蔽遙空涸池既灌蕩長溝復淙潨衰茄漸回紫梨亦髙埀紅堤栁更薄隂汀花還短叢荒隴愛登陟平林望青蔥即此已愈悅固知慰疲農愧無詩人德何由歌屢豐辛酉大醉書東郊主人壁洪武十四年人生百年中疢疾與災危風雨愆期至歡樂能幾時仲春二三月桃李正華滋蝴蝶滿東郊倉庚鳴且飛招我同心人䇿馬試輕衣東家飲美酒西第彈鳴絲鳴絲未及已四座賦聲一作新詩日暮始歸來明旦復如斯君看多財子計惜在毫釐終夜不能眠握算至晨曦一朝籍縣官雖悔何所追擬曹丕芙蓉池上作蔥蘢佳木隂蕩漾緑水池月出麗髙城流光溢前墀芳草生路旁馥郁隨風吹臨軒酌芳醴秉翰賦新詩雖非賢主人列坐皆瑰竒而況同一心相愛不復疑君看隨陽鳥洲渚亦相依四海皆兄弟斯言豈為非願敦夙昔好黃髮不可違夏景南宅擺霞髙齋夜方永明燈吐光華賔友逺來集笑語紛已譁中庖出肥鮮盈盤疊赬霞獸鼎翻濤瀾象箸正交加屢漬不厭頻啖之味逾佳春醪亦時至醉飽豈云賖我本羇旅人不復知嘆嗟何以著斯美永言發淫哇淮安道中花明野館靜樹暗流鶯語行雲千里來凌亂傷心緒傷心復何事家在江南渚日暮莫回頭脈脈江南雨偕友人早出郊離羣寡逰豫得朋殊繾綣相將度春水散漫入芳甸班荆煙乍斂摘花露猶泫林鶯坐未出沙鳥飛還見遙山浮空翠晴雲曳輕練一聽野人言復起滄洲願李舒章云清踈掩映詠池上雜花猗那臨池沼的皪異蒿蓬丹鳯已軒舉牽牛亦蒙茸天蓮碾輕碧春羅敷淺紅浥露方卧隴因風更依窗離立各為侣纒綿復成叢乃知生物心非藉雕琢功淋漓元氣問洪纎係其逢悠悠念吾始默默思何窮送縣學生顧立夫嵗貢入京霰雪殊未已山川氣方沍千里向蕭條胡為事奔赴明廷䇿多士嵗貢有程度海隅蒼生地慎選恐違誤況兹生民秀聲聞見庠序居然瑚璉器匪但才華富兹行協輿論拭目俟騫翥朋逰極追仰張設臨浦溆踈栁凝晚色幽花抱寒素嗟余久衰邁復此動離緒悵望天際帆徘徊郭西路池上二首秋池行樂去一作處池樹色已暝露下夕衣涼月上風簾靜飢禽墮踈竹鳴蛩出深井夜久人事息蕭然諸念屏振衣書齋客逍遙池上步林隈薄霧起石隙幽泉度鷗迷夕樹返魚觸秋荷去清聲水上來欲去更延佇席上懷吳善卿荒城下餘照髙樹留殘雨林靜微花落梁空孤燕語美人事征討日夕嚴虎旅接袂竟何由持杯望煙渚范氏溪南野色樓水北有層構軒忩靜沈沈下視平郊迥草樹亦蕭森莽莽區落間迢迢煙霧深幽花被髙阜夕嵐滿遙岑歸鴻共遵渚海鶴遞鳴隂我聞鴟夷皮輕舟去江潯安知逺孫子髙卧遂間心焉能稅吾駕從爾日登臨題東齋壁林廬寄幽曠墟落但煙霏澤葵依廢井秋瓜生故籬左右皆鹿場水鳥終夜飛我來嵗云久似與世相違讀書不聞道聊復自娛嬉濁酒雖不多酌之亦忘飢仲父雖云仁樹塞猶見非小人固有分儉陋乃其宜原思坐鳴琴允也百世師鄉友攜酒至舍下野老何所將春醪及園蔬遙遙適我舍相與為歡娛上談羲皇際下逮唐與虞秦漢無足論且復話樵漁樵漁雖微賤頗似淳古初戒之勿易言相顧但嗟吁且盡一日樂焉能念其餘置酒今日非昨日一作田間好風日置酒衡門前林花發光彩飛鳥亦翩翩弱女時往來小兒誦詩篇細君亦不惡中饋能周旋春蓀前後至炮鱉味亦鮮自我來此居倐爾已三年終嵗不能安憂患相纒牽乃今得此樂豈復為偶然壺盡汝當沽醉來我自眠詠池上芭蕉亭亭虛心植冉冉繁隂布既掩猗蘭砌還覆莓苔路卷舒今自知衰榮隨所寓默契方在兹臨軒挹清醑早出田所愧無經濟術徒有茂異名行逰三十年不見有所成歸來得荒地僶俯始學耕方春多雲氣甘雨亦時行大澤含澄瀾溝澮皆滿盈清晨出門去路與煙霧并庶幾望秋實敢懷勤苦情日午有濁醪揮汗且復傾耕田窳薄非令器容受固不宜六籍雖云誦於道竟何知晚途棄末學農圃以為師方春治臺笠南畝秉鎡基出入田水間霑濕豈暇辭但願秋穀成童稚有粥糜沮溺自辭世小人安敢期送林仲鏞崑山學職仲鏞博學有才行惜乎死于山東之亂往教崑山崑人至今稱林夫子云詰旦寒雨歇幽澤多蘅杜美人治舟楫言往崑山下崑山萬家邑於焉有庠序談經子所安操袂吾所慮會面不可知江水渺難度日暮獨凝思藹藹煙中樹題望雲卷逰子行逺道孤雲天際飛吾親舍其下道逺不可歸道逺將奈何孤雲正飛揚飛揚無時已淚下沾衣裳衣是親手縫線長縫亦密見衣未見親萬里空相憶相憶復相憶山川中間之兒髮今已白親顔當就衰雲亦日夜生親亦日夜安行當見親面無用涕闌干古意二十首八紘何茫茫千里復萬里六馬方驕悍踸踔終未已東臨碣石岸西涉流沙水炎州氣輝赫幽谷水迤瀰白日墮崦嵫倉皇將何止王良本賤工善御徒云爾焉能縶其足伏櫪噉芻豉翩翩為學士冠帶自成羣朝去莫來歸終嵗常辛勤盈盈發春葩燁燁競芳辰飄風倐然來零落成埃塵黃鵠逰四海日暮集崑崙願言息爾駕還居守蓬門團團明月珠墮此濁水中光彩雖未泯淪沒豈有窮拔山固神力舉鼎亦無雙徒有千尋綆挽之竟何從顔生不逺復斯為蓋世雄楚人好魚目越人薦明珠一日三至門主人行徐徐相見才一言薄送下前除洛陽蘇季子黃金滿後車鄒孟誦堯舜白首走道途蓐食出門去慘慘踐嚴霜問子將何之千里赴洛陽洛陽有劇孟任俠世稱強我願從之逰氣勢相頡頏路逢二三子被服儒衣裳少長各有禮講誦麋鹿場中心忽愛慕與彼遂相忘中夜治舟楫越海逺遊遨遊遨將何為萬寶聚岩坳珊瑚七尺餘珠樹羅蓬蒿持之向中國可以金張豪出門忽不樂欲進心恆慅但恐蛟龍怒骨月淪波濤人生亦有命聖賢莫能逃遺穗尚一作倘可拾言歸卧林臯秦師困邯鄲趙氏旦夕危魯連山中來排患在重圍折衝不復言辭金忽言歸清風映東夏千載以為竒我思鄒孟氏處世一何宜被髮雖可救閉户終可為斯言足明訓賢獨未之思茫茫古人中我愛原子思食粟豈云飽衣裘豈應時憔悴衡門下彈琴唱逸詩大夫適何來駟馬行騑騑入門即長嘆念子病何危貧病固不同發言忽若斯誰為同門生白首不見知莊周善著書汪洋不可禁時時詆仲尼何況賜與參南金鑄芻狗隋珠彈微禽自昔多橫議言髙罪彌深李斯逰洛陽名遂身亦危一人具五刑於古豈有之呼兒語黃犬相顧涕交頤斯時夏黃公商山方採芝段生方踰垣泄栁方閉門二子豈獨善蓋亦避世喧種粟在南野種葵在東園日夕飯一盤萬鍾何加焉周孔有遺書學士有遺言吟詠荒園裏聊以終嵗年朝坐髙堂上白飯鯉魚羮暮歸髙堂上華燭送清觥況有四海人相愛如弟兄彈琴析疑義歡樂各有情以兹度一世聊重不為輕不學狂圖一作徒子空山望長生登髙望八荒未見不死人徒看後來塜纍纍傷我神伯僑與安期於今亦不存如何學仙侣服食正紛紜獨羡顔氏子陋巷以為仁陶濳不願仕既仕亦為貧遙遙去鄉曲當時已酸辛衣冠對俗吏自卯直至申終日惟一飱濁醪豈霑脣歸來荒園裏此志乃復伸清風坐北窗雞黍會四鄰茫茫宇宙中我思見其人白日生東海倐忽墮崦嵫皓月方滿盈斯須亦已虧淮隂有竒功赫赫在一時焉知束縛去還為兒女欺大道每如此人事安足悲獨羡鴟夷子輕舟去江湄迢迢青雲上自昔為亨衢亨衢豈無極下視乃泥塗商君變法時寧知裂其軀貴賤更迭來榮辱在須臾願為雙黃鵠逰戲江與湖關中論功業相國稱發蹤一朝請苑地廷尉忽相逢免冠且徒跣局促如兒童陸生雖豎儒進退頗從容文皇好直言容受無留停鄭公在當時頗得諌諍名一稱田舍翁千載傷我情攖鱗固為難回天亦非輕先人有薄田歸與長沮耕幽谷有貧士白髮被兩肩人事既乖互年運亦迍邅敝屣久不縫短褐夙已穿讀書雖聞道好酒況無錢常遭富人笑豈有貴人憐我聞齊景公千駟亦徒然夷齊餓西山後世稱聖賢十五志為學四海訪巨儒低回梁宋郊浩蕩齊魯區庶從父老問得親交逰徒惜哉戎馬起中道乃趦趄歸來卧荒園白首成下愚鄒園十詠集入五律中誤釣磯白石自團團春流亦漾漾間漚雨邉至輕絲風外揚既寡羡魚情還聞濯纓唱嗟彼磻上翁投竿復何向集失後四句栁堤柔條被晴莎密隂覆芳杜逶迤起沙際寂寞連水滸鷗眠雨未歇鶯叫煙初曙還將竹竿去從爾釣春渚碁墅矗矗林影靜白石況如砥幽幽青苔色離離見屐齒豈無橘中叟還逢爛柯士日入始言歸相送青川涘瀑布青崖瀉流淙蜿蜒在窗户臨風噴輕雪穿林散飛雨髙源出無盡餘澗霑還溥羡彼軒中人似坐匡廬下桃蹊繁花亦何言人至迹愈顯因石自髙下緣源屢回轉鶯啼隂久匝雨霽苔猶淺漁父欲問津煙中聞雞犬魚淵幽壑湛虛靜衆鯈逺來歸逰泳方自得沈濳亦其宜既無網罟憂荇菜復參差辟彼翔集鳥悠然竟何疑濯清潭自川上來泓澄復奫淪涵虛既皛皛度逺方粼粼番番中林叟長纓久埃塵臨風且浩歌似念滄浪人蓼灘衍迤近橫塘陂陀間幽渚輕穗含夕霏叢條偃秋雨縱橫覆魚隊閴寂來鷗侣杖䇿時一臨逍遙更延佇松壑矯矯千嵗姿生此衆石間微颸度巖阿殷殷起波瀾幽人一壺酒日夕自怡顔安得川上舟與子相往還杏塢窈窕石徑深參差繁英滿發采已云竒生香殊未斷依依午橋路粲粲朱陳阪月色散踈景時時坐橫管與倪元鎮飲得江上雨霡霂飄無際憑闌千里隂芳田霑泥泥清波望沈沈楚客帆已重吳宫樹轉深歸鴻無肅羽别渚有哀吟君知此時意寧識故園心此係五排誤入賦得緑珠於越山水秀自古有名娃緑珠雖後來聲名天下誇明珠􅏒盈斛輕綃亦論車衆人不能得獨向石崇家名園臨紫陌髙樓隱丹霞文犀飾窗檻白玉綴簷牙為樂未及終竒禍忽來加厚意何可忘微命何足多委身泥沙際終令後世嗟殷女曾滅國周褒亦亂華古人已如此今人將奈何猶勝中郎女清淚濕悲笳海叟再賦緑珠殆為楊完者聘丞相之女而作也出西郊谷陽門西路瀄汨澍清川舟艫相縈帶蒲荷亦芊綿依依望江渚漠漠盼湖田湖田今有秋老稚飯紅蓮此實父母邦亂離乃棄捐埀老幸得歸不識陌與阡卜築願兹始逍遙終百年復出西郊步出城西門春岸多流水􅗳􅗳沙雁去茷茷一作漠漠江雲起居民亦何事南畝將耘耔提攜汀沙際吳語煙霧裏自豫離兵燹草載勞轉徙歸來展逰眺泫然懷我里餘年幸有待萑菅終可理賦得泰伯廟送倪元鎮翦商肇基迹傳季思逮聖兄弟逃荆蠻謀德一何盛千家聿來從勾吳始開境遙遙至裔孫一作闔閭欲一作國大心逾騁深宫貯妖麗髙臺瞰遐迥既拒伍胥忠還甘太宰佞鄰邦樹讎怨上國肆爭競社稷終變遷軒楹一作窗獨完整相傳在閭里灑掃致嚴淨嵗時具牲醴歌舞勞送迎楚鬼久無食越魄誰將禜強暴有湮晦聖哲無終竟於焉送將歸舟艫得依並是時春氣和氤氲滿芳徑渚花動幽彩汀蒲發深靘江水去不息煙霞日將暝斂衣拜階下懷哉起孤咏逰西墅吳王逐獸地士衡聞鶴亭古人不可見荒原今獨行遺堵儼若存阡陌復縱橫依稀望極浦迢遞盼春城江樹既暗靄原花復晶熒長煙覆漁屋白水亂鳬汀山川豈云異人事有消停即此傷往時聊復樂其生寄言後來士此理可自明懷廣西省朱郎中熙洞庭秋色晏蒼梧雲氣深夫君萬里去山水迥沈沈竟日凌浩渺連天眺岑崟一作嶺岑黿鼉逰近渚猿狖戲遙林荏苒杜若香蕭條楓樹隂皇朝重兹土逺氓方致琛而我將何念嵗莫獨離心離心一何極日夕遲徽音衡陽雁不到搔首更沈吟新除監察御史辭貫涇别業側席念賢俊旁求逮凡鄙謬當南宫薦重此柏臺委命嚴孰敢後中夜去田里鄰友贈豫邁切切語未已妻孥獨無言揮淚但相視於時十月交悲風日夜起輕舟泝極浦瑟瑟響枯葦驚鳬亂沙曲孤獸嘷荒市回首望舊廬煙霧空迤邐撫膺獨長嘆胡為乃至此顧豫久縱誕逺迹隨鹿豕乃兹年已邁精氣固銷毁趨事深為難速戾將在是皇恩倘嘉惠還歸卧江水察院夜坐吏散車馬寂一作寧月色東城上斂衣髙堂坐重門靜無響文奏屏在篋朱墨委虛幌簷影望參差霜氣一作影紛一作孤蕩漾耳目幸無役心意多遐想園廬日應敝蘿蔦春還長況兹綱紀地王事方鞅掌安得春江棹東原歸偃仰下直懷北山隱者載筆侍雲陛向夕始餘間撫彼清冷觴慰此憂戚顔出軒月才皓臨街露已繁廣庭行且止修檻去復攀幽樹藹深翠餘花發微殷俯仰不知久星漢忽西還歸來空房卧嚴城漏欲殘鴉鳴九井動劔珮亦珊珊將隨夔龍後祗肅謁重關緬懷息心侣遺世在雲山焉能從之去逍遙巖桂間答禮部江主事漸谷鳥嚶其鳴求友聲亦屢況生蒸民間豈不念朋助齊魯久咨訪梁宋亦馳騖末路值伊人歡然樂平素文義既雅馴操存復貞固輔仁將在斯有挾非所慮欣然得嘉會終歎少暇豫爾贊宗伯禮豫牽中臺務俱限清切地日夕徒思慕兹辰委篇什衷情極披露綢繆卜鄰意委曲耕稼訴靖節休官辭安仁歸田賦二子不可見千載同軌度嗟豫甚蹇劣豈復希髙步聊伸菲薄意用答賢俊顧東歸果能遂林廬得依附杉榆輝映帶雞犬互來去開園每賞新散帙共溫故兹意幸勉旃嵗久恐遲暮京師歸别業郊園草已遍雜卉駐餘春逰絲牽木杪孤鶯鳴水濱羇人懷舊居日夕自傷神遙遙千里途豈復念苦辛欣然入場圃兒女各來親當軒釋負擔拂去衣上塵老夫行役久歸來志復伸陶潛愛清風張生思故蓴援筆為此詩示我鄰里人新得溪上茅屋食肉賤粳核飢人安敢辭狐貉輕裋褐寒士固為竒自豫遭世故舉室盡流離東臨滄海岸北度三江湄蛟螭時作橫鯨鼉屢見欺展轉及衰暮始見此門楣徒壁類司馬上漏似原思既無陳平席豈有董生帷覆簣或成墻編葦聊當籬迢迢白沙岡當户勢逶迤遙遙秋浦波臨軒散漣漪翻飛野鳥羣參差灌木枝賦此平生意庶為百世規湫隘誠可哂欣幸方在兹茅宇丘中有茅宇賤子所自治東西貯筐釡中堂誦書詩雞豚各有家蒲荷亦有池農器更相貸種樹及時為朝出在田中日暮還此歸鄰里相往來春醪亦共揮老夫年既邁筋力固當衰厚祿非所慕好爵不願縻但願衡門下長無寒與飢題陶九成南村草堂多士方見材斯人乃梧檟秉心自超越當時識趨舍迢迢溪南村流水亦清寫草木發深潤里俗況淳雅於焉事結搆面勢臨曠野分明治畦町日夕供灌灑秋菰已堪煮春菘行可把子真久在谷幼安去諸夏囂雜既云一作已逺憂患兹為寡願謝鸞鵠侣從君雞豚社題葛洪移家圖有序按晉書葛洪字稚川當東晉元帝時王導舉為散騎常侍時江左卑弱亂臣叛將迄無寧嵗一時諸賢如周戴劉鍾俱斃於桀逆之手洪於是求為勾漏令覓丹砂為神仙事神仙虗無君子之所不道以豫觀之其與留侯從赤松子意同世俗不知遂以為真有此事甚可笑也吾友顧德文蓄洪移家圖一卷觀其妻子奴僕牛畜家具纍纍相從皆人道之常求仙者固如是乎此蓋院人筆當時亦知神仙為不足信略無一毫詭怪荒誕之意豫甚愛之因為賦詩一章以祛千載之惑而申洪之志云當時司馬衷愚騃回不慧牝雞肆淫虐骨肉互吞噬淵聰乘時起諸夏受其敝琅琊遂東來單弱何由濟賴此晉夷吾草草正神器國步未盡康禍亂亦遄至王敦反上遊蘇峻復凶悖淵顗已云亡超雅從兹斃葛生當是時幡然思逺逝駕言覓丹砂神仙或可致青牛載妻子舁册付奴婢遙遙向南海蓋欲避斯世嬴秦亂黔首留侯佐髙帝婉婉幕中畫取勝千里外韓彭既誅醢相國下廷尉辟穀謝人間赤松乃吾契明哲終保身疇能測其意生也雖後來心迹頗相類茫茫宇宙中清風飄無際斯人不可見撫卷增歎喟題張國祥三昧軒名麒號靜鑑惟昔司馬氏奕葉遂紛披兄弟自魚肉宇內生瘡痍當時四海士委質去相隨既往不知返焉能顧危機至今鶴唳歎凄其有餘悲矯矯張季鷹明哲終見幾秋風西北來悠然起遐思微物殊可念榮爵竟何為晨興命吾駕千里乃東歸斯人已亡逺沈冥復誰知夫君實其裔遁迹江水湄嘉名極仰止巍巍蔭華榱庶幾户牖間日夕得自師明哲得保身發軔方在兹屬辭雖云俚可配吉甫詩七言古詩賦朱焕章所畜鵜鶘鳥朱一作東家有鳥名鵜鶘意度自與凡羽殊冥蜚時時近丹穴夜宿往往歸蒼梧當時六翮須無禁何乃困頓來庭除玄雲飄蕭羽衣碎俯仰飲啄隨人意空簷燕雀亦何心喧噪迫逐無寧地孤雌孤雄復何所落日煙波隔吳楚沈思當日伉儷初豈料如今各羇旅衆雛衆雛尤痛惜父既不歸無可食縱有弱母汝念深浪髙風急身無力我言鵜鶘君莫嗔忍恥含悲度此身不見四海干戈際多少思家失路人王叔明畫雲山圖歌有客來自髙句麗遺我一幅丈二紙纎白只如松頂雲光明不減吳江水藏之篋笥今七年妻孥愛惜如紈綺至正乙巳三月初王郎逺來訪老夫升堂飲茶禮未畢索紙為畫雲山圖初為亂石勢已大橐駝連拳馬牛卧忽焉拔地髙入天欲墮不墮令人怕叶破其陽倒挂扶桑日其隂積雪深千尺日射隂崖雪欲消百谷春濤怒相激林下丈人心自間被服如在商周間問之不言喚不返源花漠漠愁人顔老夫見之重歎惜以上七字一作愁人顔空歎息何由致我共絶壁王郎王郎莫愛惜我買私酒潤君筆觀朱澤民所畫山水有感朱公畫圖愛者衆聲價端如古人重王公巨卿數見尋往往閉門稱腕痛我時挾册來郡城朱公愛我詩律精時時沽酒留我宿共聽西窗風雨聲清晨起來忘洗盥短衣飄蕭臨几案太行中條眼底生巖岫冥冥氣凌亂禹鑿龍門疏洚水根入黃河源一作元不斷南及衡陽抵桂林東入會稽連海岸是中置我一畝宫正如浮萍在江漢溪流涴涴石齒齒夾岸桃花迷逺邇原頭煙霧散雞犬屋裏詩書雜童稚扁舟逺來知是誰豈是昔日鴟夷皮五湖蝦菜殊可樂千古功名何足竒只今四十有三載公竟不歸畫圖在世間好手豈易得終日紛紛勞五采感時念舊心獨苦況我頭顱白如許呼兒捲却不忍看白髮髙堂淚如雨徐子修畫山水歌夏家髙堂生晝寒徐卿畫圖墨未乾深山大澤貯煙霧黑處似有龍蛇蟠襄陽小米師董源妙處不受繩墨牽頃刻萬里皆自然房山尚書世稱賢化為白雲滿晴巔李家將軍極清妍畏避退縮不敢前至今海內人爭傳卿惟得此二家意損益往往無凝滯意思元居造化先筆力正在蒼茫際前年為客寫林麓百道飛泉出幽谷老夫醉來不敢眠深慮波濤捲茅屋長堤曲坂路如線逺入深林時隱見水上人家不閉門門外幽花滿芳甸徐卿徐卿吾所慕草載相看髮垂素安得瀟湘三尺水更畫城東種瓜處陶與權宅觀張子正山水圖陶翁畫圖眼見稀自言愛之重珠璣清晨挂向草堂上已覺几案生煙霏蒼梧雲深衆鬼泣笠澤雨重羣龍歸崖深谷黝望不極獨有黃鵠摩空飛飛來潭上啄丹實牽動百尺藤蘿衣藤蘿飄蕭露石角林西更見幽人扉幽人長年不出户薇蕨短小身常飢嗟嗟此是誰氏筆張君吾友精天機君家祖父盡卿相門户貴顯中衰微讀書學古有至行粉墨特用相娛嬉憶昔東城飲春酒汪家林木含春暉當時揮灑每見及破屋往往增光輝自從喪亂盡失去至今夢寐猶依依偶來此處見此本欲去不忍一作去徒歔欷行當買船秋浦上請君同作釣魚磯王若水為畫秋江衆禽圖錢唐王宰心思長欲與造化爭毫芒下筆百鳥相趨蹌前身豈是孤鳯凰江頭芙蓉花正開花下細浪亦縈回鴐鵝貼貼天際來雄雌相隨氣和諧一雙鴛鴦睡沙尾野鳬翩翩唼菰米羣鷗爭浴故未已傾落枯荷葉中水鶺鴒飛飛多急難雎鳩意度誠幽間一作和鳴幽間間乃知良工有深意不在丹青形似間姑蘇臺前秋氣孤五羊城下煙踈踈此時此景真相似獨少扁舟歸釣魚宰也至今成老夫愛我不辭為此圖我今親老無可養慎勿重添反哺烏送曹生從師白沙入泥沙自黑蓬生麻中豈不直生子當置鄒魯間禮義薰陶易成德三江雪花沒馬牛曹生扣門言逺逰天地苦寒子何往負笈從師清􅍩頭魯一作曽君為儒吾所知規矩進退無差池座中弟子十餘輩森森玉立多容儀子往拜之聽教誨師嚴友親各從類一簣為山古所聞百川與海終相會他時還鄉拜庭闈百年門户頓一作有光輝里中父老皆稱歎勝似蘇家相國歸送齊文韶歸東阿江上晴雲晴復濕落絮飛花滿原隰此時君扣主人門七尺長身如鵠立自言稷下舊諸生奉命江南宰山邑三年仕宦多變故八口飄零少收拾只今零落江海邉終日遑遑但憂悒主人聞之不暇沐握髮出户遽延入淨掃南軒催下榻更開西第同宴集時余挾册依主人升堂再拜還相揖一時愛厚忘爾汝況肯瑣屑論階級朝向春國恣逰衍暮歸雪案同溫習爾來倐忽將五載嵗月荏苒如呼吸君居北海我南海馬牛之風豈相及偶然相值若兄弟信是前生有因􅊞今晨忽言歸故鄉主人錯愕余驚惶干戈未息多盜賊霜露既降無衣裳君言狐死尚首丘況我先隴安能忘聞君此語良可傷欲留不留空斷腸殷勤勸爾一杯酒明日思君江水長病阿蘇阿蘇蒙古别號也杭州阿蘇病可傷況復四體多金瘡口糧開除但乞丐終日哀鳴行路一作道旁自言家在雲中住兄弟既死惟爹娘往年江南妖賊反聖旨差我隨平章同行二千五百輩輩輩選用皆精強熟知江南風土異不比中原盡平地中原地平好馳逐一人騰驤一作攘萬人廢江南地卑山林密泥深馬滑無由立角弓著雨軟如綿咫尺相看不能射九月十月嵗云暮賊兵突入觀音渡平章脫身向東去一作走大半盡死無人顧我幸不死病已危丞相被逐無依歸異鄉此日誰相慰只似天邊孤鴈飛時甲申嵗丞相逹實特穆爾為張士誠所逐大醉後率爾三首白頭書生何所作獨把塵編海邉坐上書格君事已晚殺賊救民力尤懦四十無聞五十來不如牛馬空長大身是江南儒家子十五學經二十史低回欲得聖賢心浩蕩更覔先儒旨當時自謂才可重豈料中年人不用白頭縱得溪上田手腳生踈不能種腐儒學經經不明腐儒欲耕無地耕讀書耕田兩無成不如相隨劇孟輩博錢喫酒洛陽城江上送髙文起夫分韻得暮字集入七言律中誤青春送客黃家渡千里汀洲帶芳樹煙中歷歷白鳥來日晏翩翩綵舟去主人置酒江上屋逺客哦詩水邊路明朝花落更思君海束月上青山暮夜經胥浦鄉時新被寇丙申冬枯蒿茫茫雪初集青泥小岸硬復濕草鞋斷盡餘兩耳十步九倒何由立空村無人不敢入野狗齦齦纍百十溝中死人血未乾終夜寃魂自相泣夜雨黑風漫天天雨汁海水蕩潏如山立沙頭舊屋四角崩草茅無人不收拾此時歸來夜將半短衣無綿滿身濕西鄰燈火喚不應飯冷欲食何由食老夫五首老夫避兵荒山側三日無食在荆棘鞋襪破盡皮肉碎血被兩踵行不得於時瘦妻實卧病十聲呼之一聲應夜深困絶倚枯樹逐魂啼來雨如注逐魂怪鳥啼則雨老夫避兵黃浦上八月秋濤勢逾壯蛟龍變化不自謀鯨鯢偃蹇還漂蕩船中小兒懼且泣婦女嘔吐無人色我獨兀坐面向天篙師疾呼更索錢老夫避兵三江口江中夜夜蛟龍吼􅒂然一聲腦欲裂千尺長隄忽如走須臾海門風雨來江水震蕩如奔雷同行百船半沈溺無力救之空歎息老夫避兵三􅍩邊泖水濶絶無人煙惡風三日天正黑濕雲臭霧相盤旋草頭飛蟲嚙人肉更有青蛇口尤毒小兒無知恣奔走我欲近前捉其手老夫避兵東海頭海風吹衣夜颼颼黃蒿斷岸少人迹飢鳶無食聲啾啾狐狸向人呼姓名兩腳直立當前行自信從來膽力壯此日對之魂欲喪海叟集卷二
