body:
  text: 海叟集巻四明袁凱撰五言絶句京師得家書江水一千里家書十五行行行無别語只道早還鄉寄家書白髪時時脫一作異青山處處同人行千里外書到五湖東龍江夜行細雨過一作滿江頭孤篷夜未休歸心與烟浪相逐下揚州江上二首野屋藏春樹江隄将暮花買魚留楚客沽酒問呉娃日暮江風急江花水上飛呉船三十丈載得夕陽歸因何彦明賦八新效其體新烟覆堤初冉冉渡水尚遲遲一樹梨花色猶能似舊時新水栁外朝朝雨平添過舊痕往時桃葉渡今日更銷魂新燕乍拂芳池逺還窺繡幙重莫將花片蹴飛舞滿筵中新草水邊春尚淺沙際葉纔穿拾翠雙雙女迢迢度碧烟新鶯芳樹何年到西園夢裏驚不須重聽汝只是舊時聲新栁淺色初含雨輕隂未過池黄昏畫樓畔最是斷腸時新蝶怯露依芳蕙驚風入繡幃莫将羅扇撲更待滿園飛新月既従碧雲上復傍綺牕移願得長如此教人學畫眉絶句五首一作無題門外青青草今年更覺深前時玉釵堕侍婢不能尋羊車行樂處歌吹隔蕭墻頼有隣房女時来說故鄉月落長門去千門夜色濃夢間無限樂不道在宫中春衣裁剪罷宻葉間穠花縫到鴛鴦處時時線脚斜海内雖無事朝中有諫書大家雖未省不敢候羊車寄王九秀才夫子乆不見生涯今若何惟應江上水日日採菱荷咏馬九首生長月支國何年入漢疆猶懐水草意懶逐左賢王将軍皆衛霍不復見韓彭馳騁沙塲日時時意不平玉汗通身濕牽衣陣陣香曾騎妃子笑疑是荔枝漿穆王乗八駿此骨獨超羣繫向蟠桃樹飛花散滿身雪落天山夜風吹瀚海乾駑駘俱凍死此骨獨禁寒秦政無靈氣漢武非仙才當時若遇此一直上蓬莱鞭䇿相驅急身心不自持悔當艱險地有巧不能施荒郊還獨卧淚眼㡬曾開歴歴經行路時時入夢来老眼㡬曽開荒郊獨往来誰能飽芻菽猶勝駕駑駘六言絶句江上二首北固城頭夜雨一作晚帆西津渡口烟波白髪人人自老青山處處還多山下旌旗閃閃江邊楊栁依依騎馬将軍逺戍吹笛漁翁醉歸淮安道中山陽城中細雨廣陵堤上飛花估客時時吹笛行人處處思家郊居三首西舎槽頭溜溜南園鳥弄闗闗數觥香醪獨酌一樹梨花半殘日轉花隂傍户雨餘山色沿堤一雙蝴蝶對舞㡬箇鶯兒亂啼荒園處處閒􅇍小閣時時燕居阮籍惟思飲酒嵇康最嬾讀書醉歸北渚看花起早東隣醉酒歸遲為問臺中官馬别来㡬許人騎閒步二首春園偶爾獨往晚徑蕭然自還芳草烟中冉冉落花風外斑斑半雨半晴天氣半開半落山花半醉半醒逰客半村半郭人家七言絶句題趙王夜宴圖玉户金缸夜未央邯鄲宫裏奏絲簧鄭姬已醉韓姬倦誰拂君王白象牀題吳王納涼圖㣲月斜侵響屧廊芙蓉清氣滿金塘鴛鴦只傍闌干宿也愛君王水殿凉題吳宫衰栁圖逺岸依依落日明吳王醉處少人行多情獨有埀楊樹猶送深宫夜雨聲遣懐白髪三江一腐儒長年耽酒不耽書偶逢世亂無生計落日烟中自把鋤日莫即事茅屋秋来破不勝野雲沙樹自層層老夫生理今抛棄日日江潭去採菱送王生還呉中陸機宅畔送王紳泰伯祠西覲二親他日得書報知己東門還憶種𤓰人訪張道士題壁道士門前春日温千重碧草睡鵞羣山風忽送桃花雨濕遍牀頭白練裙歸来京國歸来老更窮短衣蕭瑟怕秋風不知飢餓塡溝壑日日吟哦江水東淮東聞張十二信少年追逐共西東呉邁文章馬亮弓一自干戈零落盡白頭淮海獨相逢寄錢彦徳故人别我山東去千里長淮復大河此日題詩付兒子白頭清淚不勝多灌園荒陂渺渺接連筒葱葉青青芥葉紅不道虞卿著書手白頭衣食野人同題張子正雪山圖西嶺千秋凍不消人家牕户總瓊瑶不知海上張公子曽過成都萬里橋口號一首丁酉嵗作白沙鄉裏今年熱清酒家家味頗醇明日杖藜行處醉只愁􅋜睡惱比隣杜彦清擕斑竹簫作數聲賦此以贈杜家兄弟我相知兄既云巨弟亦衰留得瀟湘江上竹夜深持向月中吹蒼梧魂去巳難招帝子臨江雪未消白雪伶倫多古調令人従此憶箾韶送王御史東海監散竈丁工本王郎五月赴監亭十丈官船酒滿瓶稍待凉風吹木葉老夫東去下滄溟贈歌舞女童潼河女子薦良童名在先朝樂部中訪得教坊新隊子江南江北舞春風己未九日對菊大醉戲作四首洪武十二年老夫愛此黄金蕋兒子須將白酒除直到殘陽下天去更添燈火照欹斜遮莫隣家酒已無教兒更往逺村沽老夫强健如平日醉過三更不要扶只今何處無黄菊醉著一作㸔茅茨有㡬人賢婦稍能知此意殺雞為黍莫辭貧縦道今年杼軸貧乃翁才力不超羣明朝若賣一作買長門賦還爾黄金一百斤江上舟中聞笛誰家吹笛倚江樓江上行人夜未休獨有思家兩行淚為君揮洒下揚州陪鄭明徳倪元鎮逰天平山四首官河春水緑悠悠水上人家盡畫樓買取吳娃三日酒放船直到百花洲髙臺千尺對層巒只許呉王醉裏看山色不随勾踐去逰人還得倚闌干鄭監風流老不衰倪寛頭白更應痴呉越英雄已泥土欲従江海問西施百花洲上百花開花是呉王舊日栽呉王去後無消息嵗嵗看花人自来醉後口號二首新書欲獻帝王家奈此家貧道路賒醉卧江村風雪裏時時自比賈長沙誰人更識賈長沙老作江南百姓家但使瓶中有春酒不勞慟哭與長嗟馬益之邀陳子山應奉秦景容縣尹江上看花二公作竹枝歌予亦作數首呉淞江上好春風水上花枝處處同得似鴛鴦與鸂鶒時時來往錦雲中水上花枝日日開行人頭白不能来請看門外東流水流向滄溟更不回江水東流更不回行人白髪苦相催只恐明朝風雨惡夜深燈燭亦須来千株雲錦照江沙沙上青旗賣酒家莫怪狂夫狂得徹呉姬玉手好琵琶呉姬玉手好琵琶少小聲名到處誇但使主人能愛客年年来此㸔江花江花紅白最堪憐莫惜㸔花費酒錢他時白髪三千丈縦使頻来不少年黄家渡西多好春看花須著少年人少年看花花自喜白髪看花花亦嗔松江水碧碧如一作於天水上行人坐畫船記得呉兒竹枝調為君髙唱百花前日日花前金叵羅百年能得㡬經過花開花謝還人老狂客狂吟莫厭多寄語看花江上人清明時節好来頻清明節後多風雨風雨顛狂惱殺人風雨宿蕭山東来山郭晚秋時白酒黄柑興不衰欲倩山隂王逸少為書風雨渡江詩送賀九成歸浙東兼東王若水賀老秋来憶鑑湖荷花楊栁正扶踈西過錢唐見王宰東門今少種𤓰圖𤓰歩夜泊千里長江雨乍晴江頭燈火夜深明為報髙樓莫吹笛故園東望不勝情揚州逢李十二衍二首與子相逢俱少年東吳城郭酒如川如今白髪知多少風雨揚州共被眠最憶東家水調聲花前檀板雜流鶯此時我醉君猶醒舞到梧桐白露生題老蛟化江叟吹笛圖呉頭楚尾老髯翁千里烟波有故宫日暮江亭不歸去猶将玉笛倚秋風附顧禄和韻千里神龍化作翁月明吹笛倚龍宫曲聲不許人間聽㪚入重湖半夜風閒題相如真是小人儒只解人前賦子虚負却薄田三十畝文君何用自當壚城西送鄧生二首千山風雪正霏霏君去金陵㡬日歸鳯凰臺上還吹笛東望滄溟淚滿衣東望滄溟涕泗埀閨中少婦亦霑衣他時若有相思字只寄春江燕子歸夜至𤓰洲𤓰洲人家燈火㣲𤓰洲波上行人稀敲門買得雙清酒船在西陵逆浪歸寄謝蔡道士惠山水障荆門道士蔡崑丘筆底丹青似虎頭寄我江南山水障令人日夜憶滄洲費夫人官軍應賊著紅巾苗獠来時更不仁若道南州無節婦請看東海費夫人楊員外羣盜南奔日月昏諸公臣節不須論白頭惟有楊員外不負従来天子恩寄錢徳士修二國録兼東主司業錢翁父子教成均文章誰當繼後塵若見青箱老司業還提江海釣魚人朝天宫觀方道士所畫三山圖三首東流弱水不勝塵漢武樓臺空自陳欲借横江孤鶴去須憑南嶽魏一作衛夫人巨魚出没浪波腥東望三山路杳㝠安得秦皇射蛟手為操强弩下滄溟方壺少小學為仙筆底三山豈偶然見説麻姑頭總白不知何用得長年寄三江王六秀才滄洲荷屋晚秋時橘柚青黄滿户埀安得扁舟趂潮去醉看江雨散輕絲溪上諸友謂余終日酣醉寄此見意好酒揚雄鬢已星案頭空有太𤣥經只道人来問竒字寧知門外草長青調馬益之水邊欄檻早凉天荷葉荷花盡可憐安得人如趙飛燕夜深燒燭舞蹁躚調鄭老鄭老曽為前代官江湖相見獨飢寒不道夜深霜露重猶将玉笛倚闌干送鄭老歸襄陽二首春風回首古檀溪老子茆茨溪水西鳯皇䑓上還相憶烟浪無窮碧樹低我愛襄陽老鄭䖍髙樓吹笛動秋烟他時若有平安信即寄江東估客船南京口號六首君王觀一作宫闕倚天開畫出金山復壯哉率土再瞻龍虎氣髙臺還見鳯皇来聖帝明王徳業尊親為清廟國西門皇心自是超前古況復貽謀及後昆放牛歸馬靜塵埃地北天南道路開火雞馴象時時貢不教周家白雉来南夷潭水渥洼津幻出龍駒玉雪身笑殺公孫井蛙耳天生神武是真人春雨初晴霽色開天街風雨少塵埃白面郎官調御馬雙雙騎過午門来駕出東南正好春山中草木更精神揚雄老去才情減羞見新来獻賦人即事二首洛陽大賈愛名姬富樂園中飲酒歸千􅇍長廊好騎馬不愁風雨夜霑衣天街酒好不須言絃管春風處處喧舊傳北地鳴珂巷得似南京富樂園寄北山明上人明公持律太精嚴一住空山嵗月淹聞道新年結蓮社還能酤酒引陶潛重過黄渡有感馬家宅畔無喬木徐氏門前芳草多留得白頭漁父在年年長笛送滄波題西巖精舍西巖流水夜泠泠流出松根見茯苓八十老僧忘世慮閒将佛法教山精紅梅江上千株雪未消别来渾是董嬌嬈揚州何遜頭先白奈此春雲亂眼飄徐子厚宅賞牡丹巨室髙門今已非當時臺榭總烟霏獨有徐家後園裏金盂玉枕待人歸名花朶朶擁雕簷畫燭雙雙出繡簾最是主人能愛客髙堂春酒夜厭厭石頭城晚望落日依依下石頭亂雲東望是蘇州人間何似歸思切獨有春江不斷流觀沙鷗門外羣鷗我所知終朝相見不相離一作疑借爾橋東楊栁岸明年春日更添兒江上寄嚴八一春不見嚴夫子底事城中不肯還門外白鷗三萬箇㡬時相對緑波間江上寄書湘南估客發西津東入姑蘇花正春獨有相思數行字欲從江海問情人醉書壁芙蓉花開滿髙岸還如杜老蜀江邉田夫野客頻来看白酒黄雞不用錢淮西夜坐蕭蕭風雨滿闗河酒盡西樓聽鴈過莫怪行人頭盡白異鄉秋色不勝多李陵泣别圖上林木落鴈南飛萬里蕭條使節歸猶有交情兩行淚西風吹上漢臣衣題龍江酒家二首金陵美酒玉光浮父老相傳最解愁安得身無官府事長年髙卧竺家樓江上青帘一作旗映白沙壚頭美酒亦一作玉無瑕李白當年曽醉此桃花落盡不思家登閣木落淮南秋色空閒登髙閣送歸鴻白頭老婦痴兒女盡在蕭條望眼中客中夜坐落木蕭蕭淮水長故園歸路更㣲茫一聲新鴈三更雨何處行人不斷腸賦得西施當時生長苧蘿村山色無光水亦渾勾踐得時方自喜吳王見後即消魂憶南湖二首我憶南湖春酒香百錢亦可解愁腸湖頭白藕猶堪賞正似佳人玉臂長南湖沈叟愛吟詩詩似當年杜牧之一自干戈不相見令人雙鬢欲成絲浦口竹枝一作浦口飲酒浦上荷花生紫烟吴姬酒肆近人船更將荷葉包魚蠏老死江南不怨天村園露坐暑氣消沈露氣濃倚天秋樹細含風誰家白鶴三千隻飛過先生草屋東調王生門外桃花落漸多一雙新燕又来過寄語城東王貢士今年春酒味如何題妓展僧僧像不見秋娘今㡬年水光山色自悠然月明樓上天如水猶憶梁州第四絃寄瓢齋不見瓢齋心自苦金陵又復上一作向金華茫茫春草兼春水腸斷東風日易斜寄顧文昭最憶顧家池水湄千株苔石坐題詩如今又是三年别白髪蕭蕭只怕垂過潯陽夜泊潯陽江上沙扁舟何處載琵琶西風不管水流去依舊滿汀開荻花諸公擕酒蘇臺餞别醉歸海上作此奉謝呉王洲上百花開花下人人勸酒盃醉卧春江三百里不知月過海門来聞山東消息三首王事私恩不共天益都城下枕戈眠鯨鯢戮盡為京觀子孝臣忠億萬年縦道山東柱石傾百方黎庶不須驚張皇國勢如平日詹事新来總父兵從今父老不須悲詹事英名四海知漢室中興呉楚破條侯元是絳侯兒江上逢鄭老鄭老形容今已衰江頭相見涕漣洏自說琴書零落盡獨餘吹笛似桓伊登閣追憶北山張道士閒登髙閣看春雨忽憶空山聽暮鐘道士已随黄鶴去北山依舊白雲封海叟集巻四
