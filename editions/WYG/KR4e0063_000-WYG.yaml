body:
  text: 海叟集别集類五明提要臣等謹案海叟集四巻明袁凱撰凱字景文華亭人洪武中由舉人薦授監察御史以病免歸事迹具明史文苑傳其集舊有祥澤張氏刻本乃凱所自定嵗乆散佚天順中朱應祥張璞所校選者名在野集多以己意更竄如烟樹微茫獨倚欄改為烟樹微茫夢裏山葢以詩用刪山韻而欄字在寒桓韻不知洪武正韻已合二部為一凱用官韻非奸韻也故國飄零事已非改為去去悲秋不自知葢以凱已仕明欲諱其前朝之感不知據陶宗儀輟耕錄是詩作於至正末乃用金陵王謝燕事下句自明非為元亡作也至雨聲終日過閒門改為羽聲隨處有閒門更不知其㸃竄之意何居矣宏治間陸深得舊刻不全本與何景明李夢陽更相刪定即所刋瓦岳集既晦集是也隆慶時何元之得祥澤舊刻以活字校印百部傳之萬厯間張所望復為重刻此本乃國朝曹炳曾所校以張本為主而叅以何氏本正其謬悞較諸本差完善焉凱以白燕詩得名時稱袁白燕李夢陽序則謂白燕詩最下最傳其髙者顧不傳今檢校全集夢陽之説良是何景明序謂明初詩人以凱為冠葢凱古體多學文選近體多學杜甫與景明持論頗符故有此語未免無以位置髙啟諸人故論者不以為然然使凱馳騁於髙啟諸人之間亦各有短長互相勝負居其上則未能居其下似亦未甘也陸深金臺紀聞載啟贈凱詩曰清新還似我雄健不如他其語殊不似啟殆都穆等依託為之案二語啟集不載深聞之於穆穆聞之史鑑鑑聞之朱應祥云然深以兩言為實錄則頗不謬云乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀海叟集原序海叟集雲間袁凱氏所著海叟其自號也㑹稽楊廉夫嘗作白燕詩及覽叟作驚歎以為不及叟詩法子美雖時有出入而氣格韻致不在楊下其耿耿於叟者要非一日矣按集中白燕詩最下最傳諸髙者顧不傳雲間故吳地叟亦不與四傑列皆不可曉者夫毁譽可盡信哉洪武間叟為御史上将戮一人太子固諫而止上以問叟對曰陛下創業之義東朝守成之仁上意遂解未㡬以病免歸翰林陸吉士子淵叟同郡人間道前事令人侃侃生氣夫斯亦足以傳矣而況於詩乎叟名行既晦集亦罕存子淵購得刻本於京師士人家楮墨焦爛蠧湼者殆半乃删定為今集仍舊名者著叟志也夫韓退之唐之聞人也其文至宋歐陽公始暴於世然則如叟者尚奚尤哉仲黙謂國初詩人叟為冠故子淵表揚甚力君子以為知言李夢陽序景明仕宦時嘗與學士大夫論詩謂三代前不可一日無詩故其治美而不可尚三代以後言治者不及詩無異其靡有治也然詩不傳其故有二稱為理學者比之曲藝小道而不屑為遂亡其辭其為之者率牽於時好而莫知上達遂亡其意辭意俱亡而斯道廢矣學之者茍非好古而篤信弗有成也譬之琴者古操人所不樂聞又難學新聲繁艶易學人又喜之非果有自信孰不就所易學以媚人所喜者也若是將使古道復至於無聞焉而已矣景明學詩自為舉子歴宦於今十年日覺前所學者非是盖詩雖盛稱於唐其好古者陳子昻後莫若李杜二家歌行近體誠有可法而古作尚有離去者猶未盡可法之也故景明學歌行近體有取於二家旁及唐初盛唐諸人而古作必從漢魏求之雖迄今未有一得而執以自信弗敢有奪今年罷官歸自以有餘力得肆觀古人之言又取我朝諸名家集欲讀之然弗多得其得而讀之者又皆不稱鄙意獨海叟詩為長叟歌行近體法杜甫古作不盡是要其取法亦必自漢魏以來者其所造就盖具體而未大耳噫其所識亦希矣吾郡守孫公懋仁篤於好古其子繼芳者從予論學大有向往嘗索古書無刻本者以傳予謂古書自六經下先秦兩漢之文其刻而傳者亦足讀之矣海叟為國初詩人之冠人悉無有知之可見好古者之難而不可以弗傳也乃以授之而并繫以鄙言觀者亦將以是求叟之意矣叟姓袁氏名凱其集陸吉士深所編定者李户部夢陽有序其履歴可考而知也兹不復述何景明序海叟集舊有刻又别有選行在野集者暇日因與李獻吉貟外共讀之又删次為今集云先生多權竒有才辨雅善談謔卒亦以此自免於難顧其詩乃雅重悲壯渾雄沉鬱殊不類豈先生别出其餘以應世而中之所有固自不可測耶深先生鄉人也恨相去逺無從考論姑誦其詩以附孟氏私淑之義云正徳元年秋八月八日雲間陸深題是編為海叟手定全集國初刻於張氏者久燬陸公儼山因編次為别本盖急於流布也世所傳在野集者中多朱張二公以己意更竄如烟樹微茫獨倚闌改為烟樹㣲茫夢裏山故國飄零事已非改為老去悲秋不自知盖淺於知叟者矣然郡中作者代起而鮮知叟何耶其富有力者又多纎嗇無暇為先輩表章風雅毎與西谷張君論及深有感焉因出示此編漫識其實如此嘉靖甲子春郡人董宜陽序余少嘗讀李陵泣别一詩快暢千古忠義凛然不但其辭之工也逮後在西城董氏獲閱全編而儼山諸老表揚甚力尤見前軰風流雅致同聲倡和好古樂善之心與是集並有光焉雖然詩豈易傳哉由漢魏以来浸滛於唐盛矣以李杜之聖而尚有遺論何也盖文章者道之精華而詩又其文之精而華者也獨𤣥才妙思神所嚮徃一遇知音聲施無窮耳此海叟之所以傳而至今不朽也我朝文武開創之初元氣未漓至人迭作則所謂聲音之道與治通焉其信然乎偶續前刻輒附数言萬厯己丑三月既望後學王俞書欽定四庫全書集部六海叟集目錄别集類五明巻一琴操樂府四言古詩巻二五言古詩七言古詩巻三五言律詩五言排律七言律巻四五言絶句六言絶句七言絶句
