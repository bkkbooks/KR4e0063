body:
  text: 海叟集原跋先司寇怡間公守松日得袁海叟詩愛誦之後居東省託矩菴陳公校刋今逾草餘稔偶於南都又得叟全集觀者謂宜重刻詵以板存手澤弗忍廢因録遺别刻並藏家孰嗚呼詩莫盛於杜至今無有號能選而敢易一字者海叟宗杜有大名於國初輒為選者遺其半暇嘗校評未見集中之遺者果皆弗如選也然則詩安可以易選乎哉海叟風概詳見矩庵崆洞二公序兹不贅嘉靖八年嵗次己丑秋七月丙午南京鴻臚寺署丞致仕劉詵跋
