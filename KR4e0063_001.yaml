body:
  text: 海叟集卷一明袁凱撰琴操莘野操黍苖之芃芃兮資雨露之功終嵗在畎畝兮豐年之可望堯舜去我兮日逺而心傷夏王有道兮吾於此而徜徉傅巖操日之將出兮余趨乎築之所杵丁丁而不息兮汗淫淫之如雨日既入而始休兮飯粗糲而不飽叶補嗚呼其命兮余何辭乎此苦陋巷操父之生我兮斯為人類師之教我兮庶斯名之無愧簞有食兮瓢有飲人惟我憂兮我樂滋甚渭濱操渭之岸盤盤兮其流湯湯我居其下兮於今幾霜朝飲其水兮莫食其鯉與魴我日斯邁兮於余心以何傷負米操路之遙遙兮實百其止以兒視之不逾尺只道路豈不逺兮我親實餒親之餒兮兒安得止親食飽兮兒心安兒勞悴兮親胡為歡樂府門有車馬客行客作路誤主人堂上坐門前車馬來車馬一何廣逺近生塵埃好客不厭多惡客何為乎寄言主人道結客毋一作何草草江南曲集無曲字江南好流水中有鯉魚與雁鳬汝出取魚與雁鳬養我堂上姑姑今年老鴉聲嗚嗚聲嗚嗚良可哀生而不能養死當何時回死而不回嗚嗚良可哀短歌行昨日舊榖沒今日新穀升壯年不肯一作間住衰年日憑陵日月行於天江河行於海海水不復回日月肯相待日月不相待自古皆死亡死亡不能免安有却老方仙人鄭伯僑於今在何方爾骨茍未朽螻蟻生肝腸獨有令名士可以慰情傷雞鳴行集無行字雞鳴雙户間行人出門闌出門一何易入門一何難君今逺行地妾欲置微意燕趙尚豪俠殺人為意氣鄒魯多儒生彬彬守經義臨岐不感慨自古稱為明送子涉逺逰聼我雞鳴行紫騮馬君騎紫騮馬逺上燕山去老母倚門啼淚濕門前路淚亦何時乾馬去無回步前月附書還致身在郎署月賜既已多取得尚書女身榮自可樂母死無人顧多謝鄰里人將錢治墳墓從軍行烽火塞上來發卒備行伍翩翩長安兒力未勝弓弩幸蒙車騎念出入在幕府風煙一朝息歸來受茅土翻笑李將軍血戰自辛苦獨漉篇仰天天無窮俯地地無垠天地自無盡誰為百年人百年之中人復能幾汝不成人憂我父母雨雪一作苦寒行雨雪雨雪凄風如刀我行中野而無緼袍我寒我飢誰復我知四無人聲但聞熊羆熊欲攫我羆復敓我我身煢煢進退不可進固難矣退亦何止還望舊鄉逺隔江海江波湯湯海波洋洋我思我鄉死也可忘芳樹芳樹生後園棘生芳樹傍蟲來齧樹根終也被棘傷棘傷蟲即死樹葉自芬芳忠賢在君側四境敢陸梁不獨君與臣亦有弟與兄兄弟宜相近不宜逺相忘相忘亦何難外侮不可當君看芳樹辭辭短義則長估客樂大船峩峩來小船蔽江下借問是阿誰云是襄陽估襲輕貨走四方衣美錦食稻粱可憐江南農無老與少終嵗力耕不得一飽銅雀妓流塵拂還集粻糒儼然陳歌吹自朝暮君王寧復聞松柏有時摧妾非百年人願為陵上土嵗久得相親楊白花楊白花飛入深宫裏宛轉房櫳間誰能復禁爾胡為髙飛渡江水江水在天一作本無涯楊花去不歸安得楊花作楊樹種向深宫飛不去逰子吟遊子行萬里母心亦如之陸行有虎豹水行有蛟螭盜賊凌寡弱風露乘寒飢誰云髙堂安中有萬險危寄言里中子親在勿逺離詩品張東海云景文作遊子吟謂逰子行萬里母心亦如之蓋欲人子體親之心以自保甚有補於世教談者尚之四言古詩荒園莽莽荒園隂隂霧霾剃以灌木帶以蒿萊鼷鼠踸踔鴟梟嘯哀中有一士憔悴形骸三世不顯終身無媒冠裳綻裂毛髮毰毸食無餘糝室有浮埃朝餐井李夕蔭園枝亦一作爰有琴册咏歌喧豗亦有流泉載沿載洄豈不辛苦聊用徘徊昊天賦命如彼之材卑不可抗髙其能摧貴賤賢愚孰能遷推尼父天縱回亦竒材厄陳屢空曾無歎唉一作嗟明明聖軌烈烈髙懷景行先哲敢不欽哉蔣氏夀萱堂湜湜黃河東流為莆維莆之陽季碩氏居維季碩氏夙失其怙母氏是拊是復是顧是乳是哺燥濕易處不敢笑語不敢恐懼母也勞苦既長而教出就于校復因復好克荷克紹母也其老嗟嗟我母如彼昊天何以報之維以永年燁燁芳草樹之於隂翼翼髙堂匪髙且深維此芳草其氣揚揚母氏覯止其憂乃忘既忘其憂其樂悠悠無有災咎維康維夀其夀維何如山如河不竭不磨寢食具一作且宜叶水有逰鯉陸有粳米烹炙淅洗甘膏去聲􅎵瀡酌此春醴於堂之北於堂之北旦旦若是曷其有既我歌我詩置之於楣告爾後來告爾後來季也可儀陶節婦詩維費榮敏江夏啓封何以世家户侯縣公抑抑節婦實維其孫始由舊姻遂此新婚翁亦大族內外百口爰覿令儀具曰賢婦其賢維何孝于姑嫜凡百之為敬恭是將夫良妻柔敬之如賓雍雍閨門曾無間言姻親之間嵗時問遺榛栗棗修罔敢遺隨孰司其權降此後災昔如雨一作兩龍相隨以飛如何中途羽翼忽乖又如黃鵠雍雍喈喈一失其雄雌將疇依亦既逝矣一作止家亦毁矣煢煢孤嫠將復何倚婉婉弱女索索空宇載枝載梧越此寒暑維此寒暑厥維一作實艱哉人維我憂我寧嘆嗟如彼之白涅亦不緇如彼之堅磨亦不虧蓬首布衣多歷年所不懈不怠有進無阻天相厥德女既有家庶幾其門不墮以遐昔聞共薑之死靡慝亦有孝婦終養不惑人亦有言千載一時欲知古人視此後來山則有杞隰則有芷溫溫淑人百福是履我歌此詩可配國風實而不浮觀者是恭賦耕隱維古四民次二曰農雖及我私豈忘於公沮溺之徒始為隱淪滔滔不歸乃潔其身溫溫黃生在彼原畛既耕既藝遂名為隱其隱維何無與於世左饘右粥聊以卒嵗人亦有言可仕則仕茍非其時進退由己嗟嗟衆人不惟其危朝趨夕奔終蹈禍機惟生之為彼善於斯悠悠我心樂且無災徐氏建華亭學詩渠渠新學徐卿始作伊誰克完季子仲寬維此新學始亦甚隘爰斤一作斥爰構以就於大其大維何有門言言有堂軒軒有廡騫騫有階平平髙墉連連鑿池濺濺樹木芊芊凡民之俊其來如雲小心鞠躬不墮以勤維昔元聖訓言斯明百工居肆匪肆不成嗟嗟爾俊亦既知止豈徒誦言厥有微旨其旨維何曰仁與義明明仁義不逺甚邇爾求其方先我孝悌維此孝悌為仁之始始於家邦終於四海昔為棫朴今則楩櫧昔為碔砆今焉璠璵是蓄是儲邦家之需嗟嗟爾俊克就兹美誰其始之徐氏父子徐氏父子可謂曰賢我歌我詩刻於學宫叶以告後人以永其傳賦許思敬真率軒許作諸誤邃古之初民性質朴不侈不靡燔黍捭豚汙尊抔飲取足而已淳風既漓日趨於卑如彼流水食必方丈器必雕鏤蕩然無紀其或不然是有後言爭笑迭毁洛河之南大賢是居思整其圮倡為真率以究其源以窒其委真則無偽率則易成亦克為禮惟許敬氏恭儉和易深用仰止大書於家朝夕是瞻庶蹈其軌悠悠之徒既沾既濡曾不知此草木無章發為聲詩敬贊德美送貢先生入閩此首集不載日月異行川嶽異途嗟嗟我人胡能並居衎衎夫子奕世之儒不耽世華而味道腴伊余後生固陋荒蕪學匪上達質為下愚既蒙不鄙通家視余朝趍函丈夕陪座隅話言諄諄既霑且濡其霑如何如彼時雨膏液滲漉萌芽翹舉庶幾有成實堅實好如何翩然逺邁於道肅肅王命孰敢後之峨峨閩關載驅載馳湯湯江流泛泛行舟睘睘僕夫負擔以趨悠悠長林蕭蕭逝波瞻望弗及為之奈何昔為長葛松柏是依今為轉蓬蕩然無歸山則有砠河則有渚嗟嗟我人獨行踽踽天髙無窮地長茫茫允矣夫子何時可忘海叟集卷一
