body:
  text: 海叟集卷三明袁凱撰五言律送孔提舉航海歸曲阜宣尼老孫子白晳更長身家世誰䏻念干戈獨愛貧未聞興禮樂還似泣麒麟今日乘桴去魚龍莫惱人送李髙士歸荆州南京髙宴罷西土遂言歸江路猶殘雨荆門正落暉蓬生仲蔚宅秋入老萊衣明日思君處蕭條鴻鴈飛馬氏西園宴别吳進士善卿竹隂連水屋荷氣集池臺南國佳人去西園髙宴開好風因樹起新月渡河來别後江潭上離腸日九回懷陶叟陶叟今何在迢迢江水東瓜田連暮雨荷屋近秋風本在羲皇上聊逰鹿豕中幾時春夜飲還對燭花紅陪楊廉夫登洙涇法忍寺閣次壁間韻伍子行師日秦皇駐輦辰英雄無處所樓閣自天神白鳥晴沙逺雲山錦樹新誰知千載後悽惻弔斯人客中除夜今日集作夕為何夕他鄉說故鄉看人兒女大為一作作客嵗年長戎馬無休歇關山正渺茫一杯椒葉酒未敵淚千行任氏北園呈席上諸公春色誰家好名園江上開紅樓連廣陌白水接髙臺魚畏埀綸去鶯因好樹來髙朋方滿座虛薄愧多才采石春望夜泊青山渚朝登采石磯蜀雪應消盡吳船猶未歸五湖花正落三江鶯亂飛同行王主事此日亦沾衣春日偶書罷官御史府屏跡五湖東江水供漁釣山花費酒筒野情方浩蕩髙論一作咏入虛空明日一作猶有春田事還尋荷蓧翁泗州書懷白髮三吳客清秋泗水邊官途隨老馬歸夢逐風鳶酒盡尋僧舍書來問客船淮南與淮北漂泊過年年自京師歸别墅政拙辭驄馬身閒問緑蓑此生人共棄長日自行歌野圃啼鶯滿春江鬪鴨多黃家酒壚近風雨亦來一作相過思歸兼簡嚴八天髙風正急鴻鴈傍人飛江外無來使淮南盡搗衣悲歌聊當泣逺望亦同歸為報嚴夫子滄洲與願違宴王主簿宅故人王短簿老未即歸田賔客尊耆艾園池有嵗年好花留舞蝶髙栁宿啼䳌最愛西亭好時時得醉眠懷王道士宣城王道士愛著芰荷衣一自清江别三年白鴈飛酒徒隨處有沽客向來稀最憶青城夜狂歌不肯歸王仙一作山人逺過聞道神仙侣來尋野客園談𤣥終未悟對酒且忘言接樹朱櫻密緣坡紫笋繁醉餘春水上坐聽白鷗喧送張七西上楚客舟航小吳門雨雪繁兵戈方浩蕩江海失攀援濁酒非䏻醉深交不易言明朝空寂寞獨對野人園夜泊鏌鎁城江水春逾濶山雲夕更深移舟沙樹底挂杖古城隂鴻鴈攙人去蛟龍入夜吟故園雙淚眼拭斷更沾襟聞張處士竹林甚盛欲觀未䏻兼簡王一秀才聞道南村竹春來接逺坡色侵沽酒斾聲送濯纓歌甚欲敲門看須憑拄杖過餘隂過西沼應覆右軍鵝陪陳應奉諸公宴馬氏西園畫樓臨曉日青蓋度行雲歌吹三春好賓朋四海聞絮嫌飛燕態花妬緑珠裙曲誤誰能顧周郎思不羣送任李二髙士歸越老去任公子重來李少君仙凡初不逺江海自離羣水繞吳宫樹山連禹穴雲汀州有長笛日暮不堪聞逺客野客頻經雨深林獨閉門故人俱殺戮一作落魄稚子共朝昏城郭無歸路江湖有斷魂夜來燈㷔短嗚咽對殘樽飲馬氏東園烏衣一作馬良東苑內春色正芳菲上客調詩律佳人試舞衣夭桃連雨發鸚鵡入簾飛況是多春酒厭厭夜不歸書寓所壁野水連斜屋秋林正壓牀把書驚眼暗嗜酒覺身狂王伯功名切江湖戰鬬忙分明故園路嵗嵗一作久欲相忘賦陶與權雲所二首居一作雲豈有從龍意還同野老居覆花初冉冉度水亦徐徐隴上時相逐溪邉或自鋤猶能作霖雨霑灑及鄰墟斯人肥遁士髙卧亦無心野樹留餘潤春花帶一作覆逺隂近牀衣欲冷拂石坐還深為問陶𢎞景何如隴上吟懷王生王生本靜者郡邑少經過家住清江曲春來白鳥多親庖餘酒肉官賦入菱荷嵗暮兼相憶臨流獨詠歌春園春園江水上江霧日昏昏沙暖常埀釣花深不閉門家童鋤壟麥野客共盤餐衰老仍耽酒經年懶出村上已日飲朱叔重一作仲東園東園臨上已北渚倒清觥門繫山公馬花留子晉笙爛羊方飫筯鮮鯉忽調羮不用思歸去猗蘭白露生登浦上閣髙閣春波上登臨獨愴然故鄉從此去久客未言還花好誰家屋帆輕何郡船朝來有微雨應灑郭西田題西山璉法師壁少離身毒國老去住精藍弟子傳燈去山雲入座參猿啼雲外樹龍卧石邉潭更欲聞清梵空簷下夕嵐村居懷京下一二友生罷職非䏻吏歸田即老農有詩聊度日無字可書空白髮將誰念黃粱且自舂故人䏻問訊家住五湖東丙申嵗書懷素書猶在篋白髮忽盈簮空費千金學何嘗一稱心呼雞秋岸逺飲犢夜江深欲問三遷術陶朱不可尋飲錢氏東園錢新內寵小閣臨春水長堤護石橋龜逰潭影動鶴舞竹隂搖把酒依山樹埀竿入澗毛只今花滿院得似緑珠嬌贈張鳴善白帝城中客清秋碧海傍乾坤方洶洶身世獨遑遑萬里空形影全家墮虎狼一作渺茫悲歌三百首一一斷人腸贈顔近仁先生忠孝士況是故侯家南省曾攀桂東陵且種瓜舊聞金可革今見玉無瑕老我空奔走因君復嘆嗟送李千户時將有海東之役中國人俱化東來貢未修聖君能大勇滄海即浮漚貔虎當前隊魚龍據集作避上逰集作流人言漢飛將今日定封侯寓所即事沙水寒猶淺江船逺未來舉家憂米粒終日走蒿萊骨肉還相棄交逰定莫猜癡兒饑困久愛父强徘徊寓所寄何彥明門倚秋沙白窗含野樹黃稍䏻親鴈鶩已覺逺豺狼舊髮從渠短新詩頗自一作似長何郎最知我酒熟定能將立春日飲任氏西園把釣集作劍歸東海開筵近北臺千林殘雪盡萬里好春回中散調琴坐山公集作翁待酒來更須花滿樹終日此銜杯集作爛醉卧蒼苔逰㑹稽山山實揚州鎮人踰浙水來禹功縣白日秦刻卧蒼苔龍起梅梁去神逰石洞開明朝有餘興更上越王臺李舒章云徑爽懷張叟說劍真無匹論文亦一作如有神氣髙真傲兀頭白自漂淪我正思前輩誰當繼後塵江南春草緑何處覓集作問行人飲田家醉後書王生壁勳業心逾懶耕鋤意頗長牛衣方自卧麟閣聽渠忙瓜果鄰家席詩書野客堂醉餘還講誦集作論未見老夫狂泗上書懷為客山川逺封侯嵗月遲後生方爾汝吾輩復馳驅豈是逢迎倦深知氣力衰還將歸老意先報白鷗知夜飲陳叟宅西苑春光好東堂夜色濃捲簾池草碧入户燭花紅爛醉誰䏻禁髙歌自不窮於陵陳仲子心腹最知儂將帥將帥多兒戲朝廷望賊平幾人思報國何處有全城未識龍蛇陳頻遭犬彘驚亞夫軍細栁千古漢家營早寒水鄉寒氣早未暮掩柴扉籬落無人過雞豚各自歸老妻薰鼠穴稚子卧牛衣安得盈缸酒深杯日日揮懷京師一二友生故人千里外野老五湖東江水舟航便雲山使客通短書何契濶長日未從容老眼昏花久因君數斷鴻京師歸别墅春園含薄霧野水散輕隂落絮隨風舞一作逺啼鶯坐樹深旅情方自遣幽意待人吟獨少揚雄客時時載酒尋遷一作移居舊屋非吾有新居亦借人往來皆是客到處只為鄰雞犬遭羇一作牽縛妻孥厭苦辛長歌燈影下命也復何嗔挽夏叔明别去才三月那知即九泉人皆遭世故公獨盡天年執紼多名士傳家有象賢老夫雙淚眼泣罷更澘然題朱自明座右銘居官之道以廉慎為先處衆之方以謙和為上此禮部尚書秦兼善以書傳濟民者吏治通南海皇綱委重臣贊襄多妙選甄拔到斯人禮部針規切中臺翰墨新豈惟銘座右萬一可書紳懷南村陶先生柴桑老孫子清望獨超羣身同鷗鷺侣心耽科斗文著書今已就運甓誰䏻勤袁安正髙卧歌罷復思君出三江口有懷錢野人衮處處無歸路悠悠且逝波渚花風外少江樹雨中多吹笛蛟龍聽開窗鸛鶴過髙人著書手頭白共蹉跎五言排律聞誅博囉帖木兒乙巳十月國步雖微蹇天心自可稽爪牙翻噬噉宗社欲顛擠蔽日朱旗入一作影連郊鐡騎嘶紫垣通䝟貐玉座接鯨鯢聖哲元無惑晨昏且暫携濟河聲杳杳幽薊色凄凄密詔親傳罷中軍氣欲迷登壇惟慷慨撫劒益悲悽敵愾心逾切勤王力自齊義聲驅海嶽直氣抉一作挾雲霓減竈秋烟薄吹笳夜月低指揮容草草進退合祈祈忌器非忘一作悲投鼠憂苗更惜稊逆徒從剪伐元惡待屠刲肘腋䏻無意神靈況夾批吕侯初受命董卓已燃臍雲雨蘇煩熱江河灌障隄萬方深慰望九廟實安栖天闕歸龍種雲山識馬蹄問安紆玉趾視膳入金閨膝下歡仍舊中宫樂未暌清秋多宴㑹仙仗日東西宫女花埀鬢都人酒滿椑里閭聞笑語燈火雜孩提白日依中道青春入故畦逺人來服食絶域盡航梯世祖功如在今王敬日躋鼎彛銘將相祍席挫黔黎淮海休波浪湖湘尚一作罷鼓鼙既聞誅柙虎莫自學醯雞桀逆亡身首忠賢荷璧圭休同隗囂輩終誤一丸泥七言律江上書懷滬瀆城邊秋氣髙鴐鵝鴻鴈各求曹不眠更識匡牀穩欲去還思小几牢幾處尺書俱寂寞百年雙鬢獨蕭騷秋江欲渡人難渡風雨龍吟長怒濤和集作次王叔善祀天妃有雪酒正初傳內府醪南來河伯避行舠百年祀事從邦典半夜神光出海濤花散曉風紛爛漫禮成春殿肅清髙聖躬端為蒼生禱不比乘槎漢使勞聞笛花發吳淞江上村隔花吹笛正黃昏風塵逺道歸何日燈火髙樓合斷魂夜靜幾家無别淚雨聲終日過一作隨處有閒門天邊楊栁今無數短葉長條非故園李舒章云中四句散弱刪作絶句似更成章次圭法師過金秀才隱居二首墟里人家烟霧深背岡茅屋自隂隂不愁逸竹妨嘉谷自愛繁枝集衆禽田父耰鋤時得借漁人舟楫莫相尋舊聞雞犬桃源裏仿佛溪邊花樹林幽人讀書黃浦上蕭條茅屋倚溪傍集作髙岡霜霑木葉深深赤潮雜溪流混混黃旁舍杯盤多芋栗秋園門巷亦馨香為語當時仲長統輸君清曠自徜佯程孟陽曰金元人亦多學杜未有如此翁之自然者妙在曠逹覺劉青田尚多著意江上早秋丙申嵗作靡靡菰蒲已滿陂菱花菱葉共集作更參差即從景物看身世却怪飄零枉嵗時得食野鳬爭去逺避風江鸛獨歸遲干戈此日連秋色頭白猶多宋玉悲滬瀆龍王廟晚眺滬瀆髙城今已殘獨餘木葉灑驚湍風雲浩蕩時將暮江水蕭條龍亦蟠千里吳鄉多戰伐孤舟蜀客轉飢寒敝裘涕淚兼新舊終日思家敢怨歎望南村二首南村烟樹接蒹葭白鷺翩翩滿白沙此地遂成茅屋計何人更識老夫家即開一作疑斷壟行新集作分竹便接平臯樹雜花戎馬紛紛終未已此身泛泛獨長嗟野水縱橫不計源雜花前後自成園魚蝦欲上人人取烏鵲歸來處處喧但得茅茨容老大即將耕鑿付兒孫淮南未定江南亂潦倒無歸却斷魂次楊廉夫先輩韻吹笛春江烟霧稀幽芳小草總相宜巫峽寧知雲雨夢滄洲欲拭芰荷衣花間鸛鶴迎人起波上魚龍挾棹飛不似南州庾開府鄉關頭白苦思歸丙申三月一日北山雨望凍雨蕭條江上來隨風霑灑氣幽哉陸機茅屋終難住伍相祠堂亦可哀獨客飄飄何處去孤帆寂寂幾時回時浙省使臣由海道入京竹枝聲斷滄江暮短髮無辜獨受催秋晚東海寓舍落葉寒蟬小巷深枯藤斜日半墻隂讀書稚子當軒坐為客衰翁倚杖吟滄海未知終老計白頭難忘故園心敝裘零落餘雙袖清淚年來似不禁沙邉沙邊細路少人行只有閒花樹樹明水閣經春塵自滿風簾終日鳥爭鳴躬耕豈願將軍顧肥遁聊成處士名白鷺晴烟滿平野老夫於此最關情喜洪山人恕復至烟巷雞鳴曙色開秋林鵲噪逺人回老夫自掃風前葉稚子兼鋤雨後苔近市酒漿渾易得傍溪魚蟹亦須來鷗邉野水明如鏡更坐寒山共一杯亂後溪上貽一二同志莫道閒居野老貧秋園事事可憐人隔溪柿葉集作子紅於火出水寒魚白勝銀誰為草茅堆積久只令兒子掃除頻棊局茶甌縱無恙底須相棄不相親飲謝氏東園謝氏池臺多好春風簾水檻不凝塵千鍾緑酒䏻留客滿樹黃鸝更可人蝶翅乍驚歌扇逺栁花輕觸舞衣頻醉餘蕩槳城東去正值南湖月色新池上書懷野水寒氷上曲池薄雲斜日下踈籬黃蒿處處迷歸路滄海年年少故知北望朝廷非昔日東來兒女更依誰老年拄杖猶無力況是飢寒血氣衰雨後西園即事雨後秋園苜蓿紅水邉粳稻亦芃芃老夫哀敗知無甪兒子耕耘已有功盡室盤飱惟任汝暮年家事莫煩公勳業文章等虛妄杖藜濁酒任集作甚誤西東張叔溫諸公擕酒至􅍩濱明日作此奉謝八月風髙鴻鴈飛三江潮落蟹螯肥已拚白髮如秋水不厭清尊共夕暉氛祲逺連豺虎窟波濤晴晃芰荷衣揚雄舊宅城東住騎馬歸來月滿扉觀王生所藏王維畫右丞小景樹參差我有林塘實似之日日欲歸還蹭蹬時時借看解愁思恨無黃鵠髙飛去獨奈沙鷗靜不移明日江頭候春水典衣沽酒待篙師大雨書寓所壁二首五月六月雨綿綿東望黃浦水連天小溪漫漫不可渡髙岸兀兀何由全家童種荷已穿壁野老捕魚還滿船南鄰少婦亦可惡濁酒盈缸須見錢濕雲密密覆髙軒濁水淹淹注滿園一雙白鳥當窗下無數黃蜂入户喧親朋何由致音問道路已絶無攀援野瓜新菜最稱意引蔓開花滿敗垣次廣西朱郎中熙見寄韻二首萬里蒼梧入望長薇垣新治日馨香已知南去無梟獍更擬西郊聽鳯凰談笑定應多暇日羈縻況復有成章幕中還試鍾王帖書遍闌干葉上霜衡陽南去與天長荔子紅椒處處香明月關門無虎豹清風臺閣有鸞凰包茅已入皆三脊卉服新成有九章幕下文書自稀少醉餘崖蜜啖紅霜姚性存將歸鶴沙以詩見别次韻十年避地誰知我此日看君自可人空谷正思駒皎皎清溪還度石磷磷韓公住處皆荒服區册歸時及早春聞道沙邊風俗好老夫東望欲為鄰京師歸至丹陽逢侯生大醉白下西風吹夜凉五湖秋草著集作動微霜千家砧杵初凌亂獨客關山正渺茫歸去定應殘臘盡飄零猶幸此身强丹陽郭裏盈樽酒且為侯芭發醉狂歸來淮甸西風送客歸江潭落木正飛飛集作霏霏屋邊鸛鶴鳴髙垤道上狐狸笑敝衣濯足每嫌秋岸冷攤書還趂夕光微倦逰季子真相似獨有賢妻肯下機郭外寄王録事白鷗黃鳥動一作弄春聲緑樹清波稱晚晴何用城中走塵土只消江上過清明深村濁酒還堪醉野老狂歌亦有情寄語東門王録事底須辛苦過平生送曹新民歸東州十年西浙曳長裾千里東歸指舊廬原上鶺鴒終有托旅情贏博近何如朝廷未擬申公使弟子猶傳伏勝書江草江花總無限為君今日重嗟吁賦緑珠得車字緑珠初嫁石崇家細馬輕駝七寶車已用明珠為匼匝更輸白璧教琵琶日日東樓傾美酒朝朝西苑看名花只為恩深不相棄還將玉體委塵沙陶宅務大使謝􅒉蘭髙州大族也暮年客中得子索詩賦此南來萬里不勝勞此日添丁氣自豪庾信甘查方自喜竇家丹桂未為髙麒麟親送千年瑞鸑鷟初生五色毛為語東鄰老都尉他年天子召枚臯賦黃葉漁村澤國西風霜樹多蕭條茅屋倚江波家人酒饌兼蝦菜野老衣裳雜芰荷東海任公時問信滄浪孺子亦來歌白鷗亦有忘機意清影相看奈爾何懷曽彥魯不見曾公白髮侵酒杯棊局最關心年華冉冉情何限江海悠悠水正深欲買小舟隨鴈去便從幽壑聽龍吟聞其恆往來龍明年春滿長洲苑拄杖穿花處處尋過黃耳墓有感陸士衡在洛被祻時寄書犬也墓在華亭南黃耳墓前春日遲栁條花萼正參差多才已逐浮雲去異物猶令後代思豢養有恩終不背交逰何事獨相欺春風緑酒人皆醉落日孤舟自咏詩京師懷吳中黃道士吳下黃師我所憐江湖離别又三年家貧似為耽詩句世亂誰䏻與酒錢溪上瓜田應蔓草沙邊茅屋任風顛稍待東南春水緑老夫書札寄吳船陪貢先生東樂飲時丙申三月三日蘭亭修禊㑹羣才此日山東亦快哉詩思正隨黃鵠去酒懷忽傍白鷗來坐逢細草身偏穩行近濃花眼自開日暮前村騎馬去兒童都到習池回詠溪上所栽桃桃樹移栽近淺沙呼兒插竹護欹斜秋來擬喫埀埀實春到還看浩浩一作灼灼花旋置酒旗深處掛更將漁艇密邊遮老夫未是文章手故少新詩對客誇賦梅花清夢二首江頭隴畔忽經行萬籟沈銷月滿􅒉琪樹園林春漠漠水晶宫闕夜冥冥只愁瑞鳯驚飛去未信鄰雞喚得醒猶似芙蓉池畔客偶然相值兩浮萍漠漠春雲凍不飛夜深那得到重圍初疑海上三珠樹漫說江南萬玉妃么鳯欲飛風細細鄰雞未誤月輝輝更隨弱水東流去逰遍三山夜不歸兵後大醉陶與權宅丙申九日也酒到愁腸味頗醇花因白髮更精神兒童休笑燈前舞老子今存死後身何處江湖為樂土誰家門户有閒人多情獨有陶徵士醉過清秋不厭頻秋日海上書懷丁酉書懷寡妹城西消息稀老夫漂泊幾時歸朝廷計議知何意丞相征行事已非東去鯨鯢方作橫南飛烏鵲正無依可憐白髮孤村裏終日哀哀賦式微舟次上海縣海上驚風亂鶴飛千村霜露亦霏霏清砧自是逢秋起白骨何由逺道歸戈甲只殘螻蟻命江山終屬虎狼威自憐此日身將老況復中宵淚滿衣海上書懷丁酉嵗作十年不見鸛鵝軍千里猶殘天馬羣涕淚每從天際老檄書誰道日邊聞荆蠻戰克心猶忍淮寇平來地已分莫怪腐儒東海上時時哀怨動秋雲壬寅九日野老園籬江水東洋洋夕露滿幽叢已教短髮從天白未厭秋花特地紅身世只今惟仗酒安危從此不關儂神交賴有陶徵士避地休官意頗同寓所丁酉二月草閣閒亭春水邊雨蒲風栁自紛然鄰翁對客惟爭席水鳥依人欲上船西北朝廷無使節東南城郭有烽烟老夫避地非逰說正少蘇家二頃田浦上寓所我有茅堂南浦潯回岡千尺晝隂隂繁花映帶墟烟密弱竹留連海氣深寂寂軒窗惟烏下蕭蕭風雨亦龍吟東家野老猶淳朴酒熟瓜香數見尋璜溪寓所髙林深竹氣冥冥野色波光更滿汀草閣雨晴鳴翡翠花畦風暖入蜻蜓書成已與山公絶賦就惟教阿買聽猶未忘情是杯酒尚須鄰里致盆瓶獨坐荒園獨坐荒園生事微幽幽門巷總煙霏家人問米侵晨去童子將薪薄暮歸肉味敢忘三月久鄉情獨與寸心違只道年來雙鬢改寧知多病不勝衣寄題馬氏草堂兼柬黃二秀才江上草堂風物幽江花紅白滿汀洲鳴鳩呼婦東西去麋鹿將兒逺近逰已有軒窗成晚趣草堂有晚趣軒更無舟楫散春愁東林早晚櫻桃熟應與黃香數勸酬追次林太守孟善韻林乃袁之舉主夫君開國配皇天五馬東來獨爾賢龔遂化行䏻賣劍姚崇遺愛合留鞭生芻未擬登門日白髮空悲薦剡年當代何人似班馬欲書循吏與留傳浦上木芙蓉盛開約黃鶴山人共觀江浦芙蓉色正深清霜㸃染更沈沈孤舟向日曾親見短褐於今欲逺尋已擬擕樽同野客集作老不妨展席對沙禽明年臂痛應全愈移遍東園野樹一作水隂江上櫻桃甚盛而豫寓所無有忽蘇城友人惠一大盒故賦此野店荒溪紅滿枝暖烟微雨共離披忽思西蜀勻圓顆正值東吳逺送時老子細看方自訝兒童驚喜欲成癡拾遺門下曽沾賜此日飄蓬也賦詩荷花野菼秋菰共一陂水禽沙鳥最相知濃香浩浩無人問清影蕭蕭只自危嵗宴苦心終寂寞夜深清淚獨淋漓渚宫更擬襄王看猶恐雄風作陳吹久雨後寓所荒村處處聞流水草閣時時自掩扉􅒉樹葉深沙鳥宿一作隱野藤花退密蜂稀只將書卷一作劔消長夏更倚漁舟送落暉天意未教戎馬息老夫漂泊敢言歸得馬叟書作此逺寄洛陽馬叟世稱賢童稚相看四十年只道詩名傳宇內寧知酒債滿江邊蓬蒿久沒揚雄宅蝦菜聊隨萬里船此日將書付歸鴈不勝一作知清淚濕吳箋春日溪上書懷丙申嵗溶溶春水雜蒹葭嫋嫋晴風度落花小巷幾時佳客至新詩獨向野人誇未聞汗馬收諸國且逐閒鷗坐淺沙春色酒杯俱在眼底須辛苦欲還家過楊右丞墓鐡騎千羣下九江將軍才氣古無雙誓傾淮海鯨鯢窟痛洗東南禮義邦荆土不防吳冦入蜀軍終惑魏人降腐儒憂國思家淚獨向西風灑石缸寄南臺掾朱自明一有闕字時初復役世祖行臺列俊賢掾郎家世本儒先一時人物青雲上十道風霜白晝前最愛羣公交薦日正逢天子中興年腐儒饑餓干戈際欲買山隂雪後船登憫忠閣唐家髙閣古城隈逺客登臨宿霧開諸帝園陵俱寂寞三韓魂魄尚歸來西山雲氣空中度東海潮音地底回聞說關河有戎馬故園南望思悲哉清明獨坐花栁千家郭外村老夫官屋近荒園晴林渺渺浮雲氣細草油油叠浪痕川上畫船爭載酒烟中長笛自消魂暮年況復追逰倦落日泥墻獨閉門書寓所西齊二首繁杏夭桃碧井西牽牛天棘故相迷遂令錦雉將雛雊復有黃鸝作隊飛地逺豈知時序改身閒直與野人齊塘坳來往誰能見只有兒童識杖藜西齊春樹日隂隂下有飛花一尺深幽客未容他處坐新詩只向此中吟鄰翁小圃春相接漁父扁舟晚更尋歸去故園應念此他時懷抱亦難禁登虎溪閣秋深時節雨霏霏獨坐江樓看鴈飛烟火數家山郭晚篷檣幾處野航歸謀生計畫人皆笑投老鄉關事已非聞道淮南新易將江湖此日亦沾衣冶亭山晚眺百尺孤亭落照間六朝遺迹草班班榮華有盡一作限英雄去江水無窮鷗鷺閒商女晚來猶自唱行人春盡不知還故園遙在三江外烟樹微茫獨倚闌白燕故國飄零事已非舊時王謝見應稀月明漢水初無影雪滿梁園尚未歸栁絮池塘香入夢梨花􅒉院冷侵衣趙家姊妹多相忌莫向昭陽殿裏飛春日溪上謾書白髮何煩試鶡冠清江久欲把漁竿㳙㳙濁酒須成醉嫋嫋晴花已倦看不忍燕鶯頻往復且留鷗鷺與盤桓東家野老渾知我日日相過却自歡次方明謙指揮海上築城韻二首城堞遙連北斗斜逺方從此仰光華諸侯幕府多春酒上將歌謡雜暮笳别去幾時還下榻興來何日欲乘槎為報安期頭白盡更煩重覓棗如瓜旗影翩翩整復斜中天星月動光華千羣貔虎方屯戍萬里魚龍聽鼓笳聖主自多開國老海隅休恃上天槎却煩上將頻思念時問東門二畝瓜野航為范子俊賦一舸夷猶野水邊渚禽沙鳥各紛然幽花滿棹初維岸春水連隄忽上天世上風波終未已江南烟雨正堪眠他日匏尊留我飲更憑孤鶴問坡仙鏡中梅的爍孤芳野水濵折來應是曉妝人瑶池風暖香初散銀漢春回跡未真奔月定知猶有影凌波却喜不生塵緑毛么鳯無栖處來往蘭房不厭貧飲任氏西園大醉呈諸公公子西園花最多花邊展席每經過清芳到手休輕折白髮欺人可奈何爾貴我榮君莫問鶯兒燕子總能歌醉後不嫌歸色晚亭亭月色滿江波寄田官馬録判馬卿離别又三秋行李蕭條古薊州粳稻熟時多有賜蒲萄醉後却無愁春風白鴈雲邊去落日黃河天際流囊裏新詩三百首還能逺寄海東頭偕黃叔明王元吉錢伯雲張夢辰金彥振元夕觀燈㑹於蕭塘吳隱居景元家舉酒屬客曰七人四百九十嵗為首句燈字為韻賦此時洪武乙丑也十八年七人四百九十嵗吳家堂上看花燈皓首龎眉方滿座金杯玉碗出清氷三寸黃柑渾似蜜百壺春酒況如澠今日相逢總知己老夫歡喜欲飛騰海叟集卷三
